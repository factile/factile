version: 2

project_name: factile

before:
  hooks:
    - ./scripts/verify.sh

builds:
  - id: factile
    main: ./cmd/factile
    binary: factile
    ldflags:
      - -s -w
      - -X github.com/factile/factile/pkg/version.Version={{ .Tag }}
      - -X github.com/factile/factile/pkg/version.Commit={{ .FullCommit }}
      - -X github.com/factile/factile/pkg/version.Date={{ .Date }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: factile
    ids:
      - factile
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - NOTICE
      - TRADEMARKS.md
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

release:
  github:
    owner: factile
    name: factile

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  disable: false
