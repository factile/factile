name: Feature request
description: Suggest a focused improvement for the local Factile CLI or MCP server.
title: "Feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow is currently hard or missing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed shape
      description: Describe the simplest behavior or command surface that would solve it.
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This is local-first and does not require hosted services, accounts, billing, or cloud sync.
          required: true
